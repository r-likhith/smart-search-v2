name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify secrets exist
        run: |
          MISSING=0
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "❌ SERVER_HOST secret not set"
            MISSING=1
          fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then
            echo "❌ SERVER_USER secret not set"
            MISSING=1
          fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "❌ SERVER_SSH_KEY secret not set"
            MISSING=1
          fi
          if [ $MISSING -eq 1 ]; then
            echo "Add secrets at: GitHub repo Settings → Secrets → Actions"
            exit 1
          fi
          echo "✅ All secrets present"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd ~/smart-search-v2

            echo "Syncing to exact commit from GitHub..."
            git fetch origin
            git reset --hard origin/main

            echo "Building new image (server still serving)..."
            docker compose build

            echo "Swapping containers..."
            docker compose up -d

            echo "Polling health (max 2 minutes)..."
            MAX_WAIT=120
            WAITED=0
            until curl -sf http://localhost:3000/api/health/ready > /dev/null; do
              if [ $WAITED -ge $MAX_WAIT ]; then
                echo "Health check timed out after ${MAX_WAIT}s"
                curl -s http://localhost:3000/api/health/deep || true
                exit 1
              fi
              STATUS=$(curl -s http://localhost:3000/api/health/ready | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "no-response")
              echo "waiting... ${WAITED}s status=${STATUS}"
              sleep 2
              WAITED=$((WAITED + 2))
            done
            echo "Server is ready"

            echo "Running smoke tests..."
            node mastercheckup.js 2>/dev/null

            echo "Cleaning up old Docker images..."
            docker image prune -f

            echo "Deployment complete"

      - name: Notify success
        if: success()
        run: echo "✅ Deployed successfully"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed — manual rollback:"
          echo "  ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
          echo "  cd ~/smart-search-v2"
          echo "  git log --oneline -5"
          echo "  git checkout <last-good-commit>"
          echo "  docker compose up --build -d"
