<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Search v2 — Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #161616;
      --border: #1e1e1e;
      --accent: #c8ff00;
      --accent-dim: rgba(200,255,0,0.08);
      --text: #f0f0f0;
      --muted: #555;
      --symspell: #00c8ff;
      --ollama: #ff6b35;
      --learnedmap: #c8ff00;
      --phonetic: #f472b6;
      --meilisearch: #a855f7;
      --fallback: #ff4466;
      --good: #22c55e;
      --warn: #f59e0b;
    }

    body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; padding:32px 24px; }

    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; flex-wrap:wrap; gap:12px; }
    .header h1 { font-size:1.8rem; font-weight:800; letter-spacing:-0.03em; }
    .header h1 span { color:var(--accent); }
    .header-right { display:flex; align-items:center; gap:12px; }
    .period { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); }

    .refresh-btn { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:6px 14px; font-family:'DM Mono',monospace; font-size:0.75rem; color:var(--text); cursor:pointer; transition:border-color 0.2s; }
    .refresh-btn:hover { border-color:var(--accent); }

    .replay-bar { display:flex; gap:8px; margin-bottom:24px; }
    .replay-input { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:8px 14px; font-family:'DM Mono',monospace; font-size:0.8rem; color:var(--text); outline:none; transition:border-color 0.2s; }
    .replay-input:focus { border-color:var(--accent); }
    .replay-input::placeholder { color:var(--muted); }
    .replay-btn { background:var(--accent); border:none; border-radius:6px; padding:8px 18px; font-family:'DM Mono',monospace; font-size:0.8rem; color:#000; cursor:pointer; font-weight:700; transition:opacity 0.2s; }
    .replay-btn:hover { opacity:0.85; }

    .grid { display:grid; gap:16px; }
    .grid-5 { grid-template-columns:repeat(5,1fr); }
    .grid-4 { grid-template-columns:repeat(4,1fr); }
    .grid-3 { grid-template-columns:repeat(3,1fr); }
    .grid-2 { grid-template-columns:repeat(2,1fr); }

    @media(max-width:1100px) { .grid-5 { grid-template-columns:repeat(3,1fr); } }
    @media(max-width:900px) { .grid-5,.grid-4 { grid-template-columns:repeat(2,1fr); } .grid-3 { grid-template-columns:repeat(2,1fr); } }
    @media(max-width:600px) { .grid-5,.grid-4,.grid-3,.grid-2 { grid-template-columns:1fr; } }

    .card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; }
    .card-title { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:12px; }

    .stat-value { font-size:2rem; font-weight:800; line-height:1; margin-bottom:4px; }
    .stat-sub { font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--muted); }
    .stat-value.accent { color:var(--accent); }
    .stat-value.good { color:var(--good); }
    .stat-value.warn { color:var(--warn); }
    .stat-value.danger { color:var(--fallback); }
    .stat-value.phonetic { color:var(--phonetic); }

    .bar-list { display:flex; flex-direction:column; gap:8px; }
    .bar-item { display:flex; align-items:center; gap:10px; }
    .bar-label { font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--text); width:100px; flex-shrink:0; }
    .bar-track { flex:1; height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:4px; transition:width 0.6s ease; }
    .bar-count { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); width:50px; text-align:right; flex-shrink:0; }

    .fill-meilisearch { background:var(--meilisearch); }
    .fill-learnedmap { background:var(--learnedmap); }
    .fill-symspell { background:var(--symspell); }
    .fill-phonetic { background:var(--phonetic); }
    .fill-ollama { background:var(--ollama); }
    .fill-fallback { background:var(--fallback); }
    .fill-accent { background:var(--accent); }
    .fill-good { background:var(--good); }
    .fill-warn { background:var(--warn); }
    .fill-muted { background:var(--muted); }

    .timing-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }
    .timing-cell { background:var(--surface2); border-radius:6px; padding:12px; text-align:center; }
    .timing-label { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--muted); margin-bottom:4px; }
    .timing-value { font-size:1.2rem; font-weight:700; }
    .timing-unit { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--muted); }

    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-family:'DM Mono',monospace; font-size:0.72rem; }
    th { text-align:left; padding:8px 10px; color:var(--muted); border-bottom:1px solid var(--border); font-weight:500; }
    td { padding:8px 10px; border-bottom:1px solid #1a1a1a; color:var(--text); }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--surface2); }
    tr.clickable { cursor:pointer; }
    tr.clickable:hover td { background:var(--accent-dim); }

    .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-family:'DM Mono',monospace; font-size:0.65rem; font-weight:500; }
    .badge-symspell { background:rgba(0,200,255,0.15); color:var(--symspell); }
    .badge-ollama { background:rgba(255,107,53,0.15); color:var(--ollama); }
    .badge-learnedmap,.badge-manual { background:rgba(200,255,0,0.15); color:var(--learnedmap); }
    .badge-phonetic { background:rgba(244,114,182,0.15); color:var(--phonetic); }
    .badge-meilisearch { background:rgba(168,85,247,0.15); color:var(--meilisearch); }
    .badge-none { background:#1a1a1a; color:var(--muted); }
    .badge-click { background:rgba(34,197,94,0.15); color:var(--good); }
    .badge-groq { background:rgba(255,107,53,0.15); color:var(--ollama); }

    .tag-list { display:flex; flex-wrap:wrap; gap:6px; }
    .tag { background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:3px 10px; font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); cursor:pointer; transition:border-color 0.2s; }
    .tag:hover { border-color:var(--accent); color:var(--text); }
    .tag.zero { border-color:rgba(255,68,102,0.3); color:var(--fallback); }
    .tag.weak { border-color:rgba(245,158,11,0.3); color:var(--warn); }
    .tag.risk { border-color:rgba(255,68,102,0.3); color:var(--fallback); }

    .section-title { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin:28px 0 12px; }

    .layer-card { display:flex; align-items:center; gap:16px; padding:16px; background:var(--surface2); border-radius:8px; margin-bottom:10px; }
    .layer-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .layer-name { font-weight:600; font-size:0.9rem; flex:1; }
    .layer-stat { font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--muted); text-align:right; }
    .layer-rate { font-size:1.1rem; font-weight:700; font-family:'DM Mono',monospace; }

    .lifecycle-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-family:'DM Mono',monospace; font-size:0.75rem; }
    .lifecycle-row:last-child { border-bottom:none; }
    .lifecycle-label { color:var(--muted); }
    .lifecycle-value { font-weight:700; }

    .src-bar { height:3px; border-radius:2px; margin-top:4px; transition:width 0.6s ease; }

    .empty { text-align:center; padding:60px 20px; color:var(--muted); font-family:'DM Mono',monospace; font-size:0.8rem; }
    .loading { text-align:center; padding:80px 20px; color:var(--muted); font-family:'DM Mono',monospace; font-size:0.8rem; }
    .spinner { display:inline-block; width:20px; height:20px; border:2px solid #333; border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; margin-bottom:12px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .depth-viz { display:flex; gap:8px; align-items:flex-end; height:80px; padding:0 4px; }
    .depth-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
    .depth-bar { width:100%; border-radius:4px 4px 0 0; min-height:4px; transition:height 0.6s ease; }
    .depth-label { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--muted); text-align:center; }
    .depth-count { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--text); text-align:center; }

    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; align-items:flex-start; justify-content:center; overflow-y:auto; padding:40px 20px; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; width:100%; max-width:760px; margin:auto; }
    .modal-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .modal-title { font-weight:700; font-size:1rem; }
    .modal-close { background:none; border:none; color:var(--muted); font-size:1.2rem; cursor:pointer; padding:4px 8px; line-height:1; }
    .modal-close:hover { color:var(--text); }
    .modal-body { padding:20px; max-height:70vh; overflow-y:auto; }

    .pipeline-step { display:flex; align-items:flex-start; gap:12px; padding:10px; background:var(--surface2); border-radius:6px; border-left:3px solid var(--border); margin-bottom:8px; }
    .step-num { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--muted); width:16px; flex-shrink:0; padding-top:2px; }
    .step-body { flex:1; }
    .step-header { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .step-name { font-weight:600; font-size:0.85rem; }
    .step-status { font-family:'DM Mono',monospace; font-size:0.65rem; }
    .step-time { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--muted); margin-left:auto; }
    .step-detail { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); }
    .step-words { margin-top:4px; display:flex; gap:6px; flex-wrap:wrap; }
    .step-word { font-family:'DM Mono',monospace; font-size:0.65rem; background:rgba(0,200,255,0.1); color:var(--symspell); padding:2px 6px; border-radius:3px; }
    .step-results { margin-top:4px; font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--muted); }

    .outcome-box { padding:12px; background:var(--accent-dim); border:1px solid rgba(200,255,0,0.2); border-radius:6px; margin-top:12px; }
    .outcome-label { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--muted); margin-bottom:8px; }
    .outcome-items { display:flex; gap:16px; flex-wrap:wrap; font-family:'DM Mono',monospace; font-size:0.72rem; }

    /* ── LIVE ACTIVITY ──────────────────────────────────── */
    .activity-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
    .activity-filters { display:flex; gap:6px; flex-wrap:wrap; }
    .filter-btn { background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:4px 12px; font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); cursor:pointer; transition:all 0.2s; }
    .filter-btn:hover { border-color:var(--accent); color:var(--text); }
    .filter-btn.active { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
    .activity-meta { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--muted); display:flex; align-items:center; gap:8px; }
    .activity-pulse { width:6px; height:6px; border-radius:50%; background:var(--good); animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .activity-row { display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid #1a1a1a; font-family:'DM Mono',monospace; font-size:0.72rem; }
    .activity-row:last-child { border-bottom:none; }
    .activity-time { color:var(--muted); flex-shrink:0; width:60px; padding-top:2px; }
    .activity-query { font-weight:600; flex-shrink:0; width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .activity-layer { flex-shrink:0; width:90px; }
    .activity-hits { flex-shrink:0; width:50px; text-align:right; color:var(--muted); }
    .activity-why { flex:1; color:var(--muted); font-size:0.68rem; line-height:1.4; }
    .activity-time-ms { flex-shrink:0; width:55px; text-align:right; font-size:0.65rem; }
    .activity-summary { display:flex; gap:16px; padding:10px 0; font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); border-bottom:1px solid var(--border); margin-bottom:4px; flex-wrap:wrap; }
    .activity-summary span { color:var(--text); }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h1>Smart <span>Search</span> Analytics</h1>
      <div class="period" id="period">Loading...</div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
    </div>
  </div>

  <div class="replay-bar">
    <input class="replay-input" id="replay-input" type="text"
      placeholder="Type any query to replay pipeline... e.g. leggigns"
      onkeydown="if(event.key==='Enter') replayQuery(this.value)" />
    <button class="replay-btn" onclick="replayQuery(document.getElementById('replay-input').value)">▶ Replay</button>
  </div>

  <!-- ── LIVE ACTIVITY PANEL ─────────────────────────── -->
  <div class="section-title">⚡ Live Search Intelligence</div>
  <div class="card" style="margin-bottom:24px">
    <div class="activity-header">
      <div class="activity-filters">
        <button class="filter-btn active" onclick="setActivityFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setActivityFilter('corrections', this)">Corrections only</button>
        <button class="filter-btn" onclick="setActivityFilter('zero', this)">Zero results</button>
        <button class="filter-btn" onclick="setActivityFilter('groq', this)">Groq only</button>
      </div>
      <div class="activity-meta">
        <div class="activity-pulse"></div>
        <span>auto-refresh 10s</span>
        <span id="activity-last-update" style="color:var(--muted)">—</span>
      </div>
    </div>
    <div id="activity-panel">
      <div class="loading" style="padding:30px"><div class="spinner"></div><br>Loading activity...</div>
    </div>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div><br>Loading analytics...</div>
  </div>

  <div class="modal-overlay" id="replay-modal" onclick="handleModalClick(event)">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Pipeline Replay</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body">
        <div class="loading"><div class="spinner"></div><br>Loading...</div>
      </div>
    </div>
  </div>

<script>
  const API = 'http://localhost:3000';
  const KEY = 'searchapikey123';

  // ── LIVE ACTIVITY ──────────────────────────────────────

  let activityFilter = 'all';

  function setActivityFilter(filter, btn) {
    activityFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadActivity();
  }

  const LAYER_COLOR = {
    learnedmap:  'var(--learnedmap)',
    symspell:    'var(--symspell)',
    phonetic:    'var(--phonetic)',
    meilisearch: 'var(--meilisearch)',
    fallback:    'var(--fallback)',
    ollama:      'var(--ollama)'
  };

  async function loadActivity() {
    try {
      const params = new URLSearchParams({ limit: '20' });
      if (activityFilter === 'corrections') params.set('correctionOnly', 'true');
      if (activityFilter === 'zero')        params.set('zeroResultOnly', 'true');
      if (activityFilter === 'groq')        params.set('groqOnly', 'true');

      const res  = await fetch(`${API}/api/admin/recent-activity?${params}`,
        { headers: { 'x-api-key': KEY } });
      const json = await res.json();

      if (!json.events || json.events.length === 0) {
        document.getElementById('activity-panel').innerHTML =
          `<div style="color:var(--muted);font-family:'DM Mono',monospace;font-size:0.8rem;padding:20px 0">
            No activity yet — run some searches first
          </div>`;
        return;
      }

      const s = json.summary;
      const corrRate = s.total > 0 ? Math.round(s.corrected / s.total * 100) : 0;

      let html = `<div class="activity-summary">
        <span>total: <span>${s.total}</span></span>
        <span>corrected: <span style="color:var(--learnedmap)">${s.corrected}</span></span>
        <span>correction rate: <span style="color:${corrRate > 30 ? 'var(--warn)' : 'var(--good)'}">${corrRate}%</span></span>
        <span>zero results: <span style="color:${s.zeroResults > 0 ? 'var(--fallback)' : 'var(--good)'}">${s.zeroResults}</span></span>
        <span>fallbacks: <span style="color:${s.fallbacks > 0 ? 'var(--warn)' : 'var(--muted)'}">${s.fallbacks}</span></span>
        <span>avg latency: <span style="color:${s.avgLatency > 200 ? 'var(--warn)' : 'var(--good)'}">${s.avgLatency}ms</span></span>
        <span style="margin-left:auto">
          learnedmap: <span style="color:var(--learnedmap)">${s.layerBreakdown.learnedmap}</span> ·
          symspell: <span style="color:var(--symspell)">${s.layerBreakdown.symspell}</span> ·
          phonetic: <span style="color:var(--phonetic)">${s.layerBreakdown.phonetic}</span> ·
          direct: <span style="color:var(--meilisearch)">${s.layerBreakdown.meilisearch}</span> ·
          fallback: <span style="color:var(--fallback)">${s.layerBreakdown.fallback}</span>
        </span>
      </div>`;

      html += json.events.map(e => {
        const layerColor = LAYER_COLOR[e.layer] || 'var(--muted)';
        const latColor = e.processingTime < 100 ? 'var(--good)'
          : e.processingTime < 500 ? 'var(--warn)' : 'var(--fallback)';
        return `<div class="activity-row">
          <div class="activity-time">${e.time || '—'}</div>
          <div class="activity-query" title="${e.query}">${e.query}</div>
          <div class="activity-layer">
            <span style="color:${layerColor};font-weight:600">${e.layer}</span>
            ${e.corrected
              ? `<span style="color:var(--good);font-size:0.65rem"> ✓</span>`
              : e.isFallback
              ? `<span style="color:var(--fallback);font-size:0.65rem"> ✗</span>`
              : ''}
          </div>
          <div class="activity-hits" style="color:${e.hits === 0 ? 'var(--fallback)' : 'var(--text)'}">
            ${e.hits}
          </div>
          <div class="activity-why">${e.why || '—'}</div>
          <div class="activity-time-ms" style="color:${latColor}">${e.processingTime}ms</div>
        </div>`;
      }).join('');

      document.getElementById('activity-panel').innerHTML = html;
      document.getElementById('activity-last-update').textContent =
        new Date().toLocaleTimeString('en', { hour12: false });

    } catch(e) {
      document.getElementById('activity-panel').innerHTML =
        `<div style="color:var(--fallback);font-family:'DM Mono',monospace;font-size:0.8rem;padding:20px 0">
          Failed to load: ${e.message}
        </div>`;
    }
  }

  const STATUS_COLOR = {
    accepted:'var(--good)', pass:'var(--good)', miss:'var(--muted)',
    skipped:'var(--muted)', penalised:'var(--fallback)', zero_results:'var(--fallback)',
    rejected_no_results:'var(--fallback)', rejected_not_better:'var(--warn)',
    same_as_original:'var(--muted)', changed:'var(--accent)', pending:'var(--warn)'
  };
  const STATUS_ICON = {
    accepted:'✅', pass:'✅', miss:'⊘', skipped:'⊘', penalised:'❌',
    zero_results:'❌', rejected_no_results:'❌', rejected_not_better:'⚠️',
    same_as_original:'⊘', changed:'✏️', pending:'⏳'
  };

  const SOURCE_COLOR = {
    manual:   'var(--learnedmap)',
    symspell: 'var(--symspell)',
    phonetic: 'var(--phonetic)',
    groq:     'var(--ollama)',
    ollama:   'var(--ollama)',
    click:    'var(--good)'
  };

  function handleModalClick(e) {
    if (e.target === document.getElementById('replay-modal')) closeModal();
  }
  function closeModal() {
    document.getElementById('replay-modal').classList.remove('open');
  }
  function openModal(title) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML =
      `<div class="loading"><div class="spinner"></div><br>Loading pipeline trace...</div>`;
    document.getElementById('replay-modal').classList.add('open');
  }

  async function replayQuery(query) {
    query = (query || '').trim();
    if (!query) return;
    document.getElementById('replay-input').value = query;
    openModal(`Pipeline Replay: "${query}"`);
    try {
      const res = await fetch(`${API}/api/analytics/replay?q=${encodeURIComponent(query)}`,
        { headers: { 'x-api-key': KEY } });
      const json = await res.json();
      if (!json.data || json.data.length === 0) {
        document.getElementById('modal-body').innerHTML =
          `<div class="empty">No replay data found for "${query}"<br><br>Search for this query first.</div>`;
        return;
      }
      document.getElementById('modal-body').innerHTML =
        json.data.map((e, i) => renderEntry(e, i, json.data.length)).join('');
    } catch(e) {
      document.getElementById('modal-body').innerHTML =
        `<div class="empty">Failed to load: ${e.message}</div>`;
    }
  }

  function renderEntry(entry, idx, total) {
    const ts = new Date(entry.ts).toLocaleString();
    return `
    <div style="margin-bottom:${idx < total-1 ? '24px' : '0'};${idx < total-1 ? 'border-bottom:1px solid var(--border);padding-bottom:24px' : ''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted)">${ts}</span>
        <div style="display:flex;gap:8px;align-items:center">
          ${badge(entry.outcome.source)}
          <span style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted)">${entry.timing.total}ms</span>
        </div>
      </div>
      ${entry.pipeline.map(step => `
        <div class="pipeline-step" style="border-left-color:${STATUS_COLOR[step.status] || 'var(--border)'}">
          <div class="step-num">${step.step}</div>
          <div class="step-body">
            <div class="step-header">
              <span class="step-name">${step.name}</span>
              <span class="step-status" style="color:${STATUS_COLOR[step.status] || 'var(--muted)'}">
                ${STATUS_ICON[step.status] || '?'} ${step.status}
              </span>
              ${step.time > 0 ? `<span class="step-time">${step.time}ms</span>` : ''}
            </div>
            <div class="step-detail">${step.detail}</div>
            ${step.changedWords?.length > 0 ? `<div class="step-words">
              ${step.changedWords.map(w =>
                `<span class="step-word">"${w.original}" → "${w.correction}" (dist:${w.distance})</span>`
              ).join('')}</div>` : ''}
            ${step.status !== 'miss' && step.status !== 'skipped' && step.status !== 'pass' && step.status !== 'changed' &&
              step.resultsBefore !== undefined && step.resultsAfter !== undefined
              ? `<div class="step-results">results: ${step.resultsBefore} → ${step.resultsAfter}
                 ${step.resultsAfter > step.resultsBefore
                   ? `<span style="color:var(--good)"> (+${step.resultsAfter - step.resultsBefore})</span>` : ''}
                 </div>` : ''}
          </div>
        </div>`).join('')}
      <div class="outcome-box">
        <div class="outcome-label">FINAL OUTCOME</div>
        <div class="outcome-items">
          <span>stage: <span style="color:var(--accent)">${entry.outcome.searchStage}</span></span>
          <span>depth: <span style="color:var(--accent)">${entry.outcome.correctionDepth}</span></span>
          <span>query: <span style="color:var(--accent)">"${entry.outcome.finalQuery}"</span></span>
          <span>results: <span style="color:var(--accent)">${entry.outcome.resultsCount.toLocaleString()}</span></span>
          ${entry.outcome.correctionApplied
            ? `<span>correction: <span style="color:var(--good)">✓ ${entry.outcome.source} (${Math.round((entry.outcome.confidence||0)*100)}%)</span></span>`
            : `<span>correction: <span style="color:var(--muted)">none applied</span></span>`}
          <span>latency: <span style="color:${
            entry.timing.latencyBucket === 'fast' ? 'var(--good)' :
            entry.timing.latencyBucket === 'medium' ? 'var(--accent)' : 'var(--warn)'
          }">${entry.timing.total}ms (${entry.timing.latencyBucket})</span></span>
        </div>
      </div>
    </div>`;
  }

  async function loadAll() {
    document.getElementById('content').innerHTML =
      `<div class="loading"><div class="spinner"></div><br>Loading analytics...</div>`;
    try {
      const [analyticsRes, correctionsRes] = await Promise.all([
        fetch(`${API}/api/analytics`,         { headers: { 'x-api-key': KEY } }),
        fetch(`${API}/api/admin/corrections`, { headers: { 'x-api-key': KEY } })
      ]);
      const analytics   = await analyticsRes.json();
      const corrections = await correctionsRes.json();

      if (!analytics.data) {
        document.getElementById('content').innerHTML =
          `<div class="empty">No analytics data yet.<br>Run some searches first!</div>`;
        return;
      }
      render(analytics.data, corrections.data || corrections);
    } catch(e) {
      document.getElementById('content').innerHTML =
        `<div class="empty">Failed to load: ${e.message}</div>`;
    }
  }

  function pct(n, total) { return total > 0 ? Math.round((n / total) * 100) : 0; }

  function badge(source) {
    return `<span class="badge badge-${source || 'none'}">${source || 'none'}</span>`;
  }

  function stageColor(stage) {
    return { meilisearch:'fill-meilisearch', learnedmap:'fill-learnedmap',
             symspell:'fill-symspell', ollama:'fill-ollama', fallback:'fill-fallback'
    }[stage] || 'fill-muted';
  }

  function srColor(rate) {
    if (rate === null || rate === undefined) return 'var(--muted)';
    if (rate >= 90) return 'var(--good)';
    if (rate >= 70) return 'var(--warn)';
    return 'var(--fallback)';
  }

  function render(d, c) {
    const s     = d.summary;
    const total = s.totalSearches;
    const cs    = c.stats || {};

    if (s.period) {
      const from = new Date(s.period.from).toLocaleString();
      const to   = new Date(s.period.to).toLocaleString();
      document.getElementById('period').textContent = `${from} → ${to}`;

    let html = '';

    // ── ROW 1: SUMMARY STATS ─────────────────────────────
    html += `<div class="grid grid-5" style="margin-bottom:16px">

    // ── ROW 3: SOURCE PERFORMANCE ─────────────────────────
    const sp = c.sourcePerformance || {};

    // ── ROW 4: LATENCY + STAGES ───────────────────────────

                <tr>
                  <td>${item.query}</td>
                  <td style="color:var(--accent)">${item.correction}</td>
                  <td><span class="badge badge-none">${item.scope}</span></td>
                  <td style="color:var(--good)">client_${item.learnedFrom}</td>
                  <td style="color:var(--fallback)">client_${item.penalisedByClient}</td>
                  <td style="color:var(--fallback)">${item.failures}</td>
                  <td style="color:${srColor(item.successRate)}">${item.successRate !== null ? item.successRate + '%' : '—'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
        <div style="margin-top:10px;font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted)">
          Corrections learned from one client but penalised by another. If this grows → consider scope enforcement.
        </div>
      </div>`;
    }

    // ── ROW 10: GROQ CANDIDATES ───────────────────────────
    if (c.groqCandidates?.length > 0) {
      html += `<div class="section-title">Groq Candidates (pending real-world validation)</div>
      <div class="card" style="margin-bottom:16px">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Query</th><th>Correction</th><th>Confidence</th><th>Scope</th><th>First Seen</th></tr></thead>
            <tbody>
              ${c.groqCandidates.slice(0,10).map(item => `
                <tr>
                  <td>${item.query}</td>
                  <td style="color:var(--accent)">${item.correction}</td>
                  <td>${item.confidence ? Math.round(item.confidence * 100) + '%' : '—'}</td>
                  <td><span class="badge badge-none">${item.scope || 'global'}</span></td>
                  <td style="color:var(--muted)">${item.firstSeen ? new Date(item.firstSeen).toLocaleDateString() : '—'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
    }

    // ── ROW 11: DISABLED ENTRIES ──────────────────────────
    if (c.disabledEntries?.length > 0) {
      html += `<div class="section-title">Disabled Corrections</div>
      <div class="card" style="margin-bottom:16px">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Query</th><th>Correction</th><th>Failures</th><th>Success%</th><th>Clicks to Re-enable</th></tr></thead>
            <tbody>
              ${c.disabledEntries.map(item => `
                <tr>
                  <td>${item.query}</td>
                  <td style="color:var(--muted);text-decoration:line-through">${item.correction}</td>
                  <td style="color:var(--fallback)">${item.failures}</td>
                  <td style="color:${srColor(item.successRate)}">${item.successRate !== null ? item.successRate + '%' : '—'}</td>
                  <td style="color:var(--warn)">${item.clicksSinceDisabled || 0} / 3</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
    }

    // ── ROW 12: BY CLIENT ─────────────────────────────────
    if (d.byClient && Object.keys(d.byClient).length > 0) {
      html += `<div class="section-title">Per-Client Breakdown</div>
      <div class="card" style="margin-bottom:16px">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Client</th><th>Searches</th><th>Corrections</th><th>Zero Results</th><th>Fallbacks</th><th>Correction Rate</th></tr></thead>
            <tbody>
              ${Object.entries(d.byClient).sort((a,b) => b[1].searches - a[1].searches).map(([cid, data]) => `
                <tr>
                  <td style="color:var(--accent)">client_${cid}</td>
                  <td>${data.searches}</td>
                  <td style="color:var(--learnedmap)">${data.corrections}</td>
                  <td style="color:${data.zeroResults > 0 ? 'var(--fallback)' : 'var(--good)'}">${data.zeroResults}</td>
                  <td>${data.fallbacks}</td>
                  <td>${data.searches > 0 ? Math.round(data.corrections/data.searches*100) : 0}%</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
    }

    // ── ROW 13: PROBLEM QUERIES ───────────────────────────
    html += `<div class="section-title">Problem Queries</div>
    <div class="grid grid-2" style="margin-bottom:16px">
      <div class="card">
        <div class="card-title">Zero Result Queries — click to replay</div>
        ${d.zeroResultQueries?.length > 0
          ? `<div class="tag-list">${d.zeroResultQueries.map(q =>
              `<span class="tag zero" onclick="replayQuery('${q.replace(/'/g,"\\'")}')">${q}</span>`
            ).join('')}</div>`
          : `<div style="color:var(--good);font-family:'DM Mono',monospace;font-size:0.8rem">✓ No zero result queries!</div>`}
      </div>
      <div class="card">
        <div class="card-title">Weak Result Queries — click to replay</div>
        ${d.weakResultQueries?.length > 0
          ? `<div class="tag-list">${d.weakResultQueries.map(q =>
              `<span class="tag weak" onclick="replayQuery('${q.replace(/'/g,"\\'")}')">${q}</span>`
            ).join('')}</div>`
          : `<div style="color:var(--good);font-family:'DM Mono',monospace;font-size:0.8rem">✓ No weak result queries!</div>`}
      </div>
    </div>`;

    // ── ROW 14: SLOW QUERIES ──────────────────────────────
    if (d.slowQueries?.length > 0) {
      html += `<div class="section-title">Slow Queries (&gt;1000ms)</div>
      <div class="card" style="margin-bottom:16px">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Query</th><th>Time</th><th>Stage</th></tr></thead>
            <tbody>
              ${d.slowQueries.map(q => `
                <tr class="clickable" onclick="replayQuery('${q.query.replace(/'/g,"\\'")}')" >
                  <td>▶ ${q.query}</td>
                  <td style="color:var(--fallback)">${q.time}ms</td>
                  <td>${badge(q.stage)}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
    }

    document.getElementById('content').innerHTML = html;
  }

  // ── INIT ──────────────────────────────────────────────
  loadActivity();
  loadAll();

  // analytics refreshes every 30s ✅
  setInterval(loadAll, 30000);

  // live activity refreshes every 10s ✅
  setInterval(loadActivity, 10000);
</script>
</body>
</html>
