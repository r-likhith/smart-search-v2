services:

  meilisearch:
    image: getmeili/meilisearch:v1.42.1
    container_name: smart-search-meili
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - ./data.ms:/meili_data/data.ms
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  smart-search:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-search-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MEILI_HOST: http://meilisearch:7700
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./learned:/app/learned
      - ./logs:/app/logs
      - ./multiTenantLogs:/app/multiTenantLogs
      - ./sync_state:/app/sync_state
      - ./data:/app/data
    depends_on:
      meilisearch:
        condition: service_healthy

volumes:
  meili_data:
